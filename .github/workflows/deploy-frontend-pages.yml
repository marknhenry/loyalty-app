name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment label (informational)"
        required: false
        default: "production"

# Grant the minimum permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new one is triggered
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: |
          echo "📦 Installing frontend dependencies..."
          npm ci

      - name: Type-check and build
        working-directory: frontend
        run: |
          echo "🔨 Building frontend (tsc + vite)..."
          npm run build
          echo "✅ Build complete — dist/ contents:"
          ls -lh dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Report deployed URL
        run: |
          echo "🚀 Deployment complete!"
          echo "🌐 Live at: ${{ steps.deployment.outputs.page_url }}"
